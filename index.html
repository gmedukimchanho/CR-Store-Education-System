<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CR Store Education System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- Firebase SDK (최신 호환 모드) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --bg: #fff; --text: #000; --border: #000; --gray: #888; --light: #f9f9f9; --accent: #ff4d4d; --blue: #0066cc; --green: #217346; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* UI Components */
        .btn { border: 1px solid var(--border); background: #000; color: #fff; padding: 10px 18px; cursor: pointer; font-weight: 800; font-size: 11px; transition: 0.2s; text-transform: uppercase; text-align: center; border-radius: 0; }
        .btn:hover { background: #fff; color: #000; }
        .btn-sm { padding: 6px 12px; font-size: 10px; }
        .btn-outline { background: #fff; color: #000; }
        .btn-danger { border-color: var(--accent); color: var(--accent); background: #fff; }
        .btn-danger:hover { background: var(--accent); color: #fff; }
        .btn-blue { border-color: var(--blue); color: var(--blue); background: #fff; }
        .btn-excel { border-color: var(--green); color: var(--green); background: #fff; }
        .btn-full { width: 100%; display: block; }

        input, select, textarea { background: #fff; border: 1px solid #ddd; padding: 10px; width: 100%; margin-bottom: 10px; font-size: 13px; border-radius: 0; }
        header { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #000; position: sticky; top: 0; background: #fff; z-index: 100; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 50px; }
        .section-header { margin: 40px 0 20px 0; border-bottom: 3px solid #000; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        
        /* Layout Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { border: 1px solid #eee; min-height: 400px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
        .card:hover { border-color: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card-img { width: 100%; height: 160px; background: #f0f0f0; object-fit: cover; }
        .card-content { padding: 20px; flex-grow: 1; }
        .mandatory-tag { background: var(--accent); color: #fff; padding: 4px 8px; font-size: 10px; font-weight: 900; position: absolute; top: 10px; left: 10px; z-index: 10; }

        /* Panels */
        .panel { margin-top: 30px; border: 1px solid #000; padding: 30px; background: #fff; }
        .tabs { display: flex; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid #eee; overflow-x: auto; }
        .tab-link { font-size: 11px; font-weight: 800; color: #ccc; cursor: pointer; white-space: nowrap; padding-bottom: 10px; }
        .tab-link.active { color: #000; border-bottom: 2px solid #000; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; font-size: 12px; }
        th { background: #f9f9f9; font-weight: 800; }
        .badge { padding: 3px 6px; font-size: 9px; font-weight: 800; border: 1px solid #000; display: inline-block; }
        .history-box { background: #f9f9f9; border: 2px solid #000; padding: 25px; margin: 20px 0; }
        .dept-selector { border: 1px solid #ddd; padding: 10px; max-height: 120px; overflow-y: auto; background: #fff; margin-bottom: 10px; }

        /* 📱 Mobile Optimized */
        @media (max-width: 768px) {
            header { padding: 15px 20px; flex-direction: column; text-align: center; gap: 15px; }
            .container { padding: 15px; }
            .grid { grid-template-columns: 1fr; }
            table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .admin-split { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body>

<!-- 로딩 화면 -->
<div id="loading-screen" style="position:fixed; inset:0; background:#fff; z-index:10000; display:flex; align-items:center; justify-content:center; font-weight:900;">
    GM EDU SYSTEM 연동 중...
</div>

<!-- 로그인 -->
<div id="auth-overlay" class="hidden">
    <div class="auth-box" style="width:100%; max-width:360px; margin:15% auto; text-align:center; padding: 20px;">
        <h1 style="margin-bottom:30px; font-size: 24px; letter-spacing: -1px;">CR STORE<br>EDUCATION SYSTEM</h1>
        <input type="text" id="login-id" placeholder="사번">
        <input type="password" id="login-pw" placeholder="비밀번호">
        <button class="btn btn-full" onclick="app.handleLogin()">로그인</button>
    </div>
</div>

<!-- 온보딩 -->
<div id="onboarding-form" class="hidden" style="position:fixed; inset:0; background:#fff; z-index:10001; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="auth-box" style="width:100%; max-width:360px;">
        <h2 style="margin-bottom:20px;">최초 정보 설정</h2>
        <input type="text" id="init-name" placeholder="성함">
        <input type="text" id="init-dept" placeholder="소속 (매장명)">
        <select id="init-pos">
            <option value="">직급 선택</option>
            <option value="팀원">팀원</option><option value="부매니저">부매니저</option><option value="매니저">매니저</option><option value="팀장">팀장</option>
        </select>
        <input type="password" id="init-pw" placeholder="새 비밀번호">
        <input type="password" id="init-pw-confirm" placeholder="비밀번호 확인">
        <button class="btn btn-full" onclick="app.completeOnboarding()">저장 및 시작</button>
    </div>
</div>

<header>
    <h1 onclick="app.goHome()">CR Store Education System</h1>
    <div class="nav-info">
        <span id="display-user"></span>
        <button class="btn btn-outline btn-sm" onclick="app.togglePanel('mypage')">마이페이지</button>
        <button id="admin-toggle-btn" class="btn btn-outline btn-sm hidden" onclick="app.togglePanel('admin')">어드민 패널</button>
        <button class="btn btn-sm" onclick="location.reload()">로그아웃</button>
    </div>
</header>

<div class="container">
    <div id="notice-bar-top" class="notice-bar" style="background:var(--light); padding:15px; border-left:5px solid #000; margin-bottom:30px; cursor:pointer;" onclick="app.togglePanel('mypage')">
        <b>[공지]</b> <span id="notice-text">정보를 불러오는 중입니다...</span>
    </div>

    <!-- Mypage -->
    <div id="mypage-panel" class="panel hidden">
        <div class="tabs">
            <span class="tab-link active" onclick="app.switchTab('mypage', 'my-apps')">나의 수강 현황</span>
            <span class="tab-link" onclick="app.switchTab('mypage', 'my-account')">비밀번호 변경</span>
        </div>
        <div id="tab-my-apps"><table id="my-apps-table"></table></div>
        <div id="tab-my-account" class="hidden">
            <div style="max-width:300px;">
                <input type="password" id="my-new-pw" placeholder="새 비밀번호 입력">
                <button class="btn btn-sm" onclick="app.changePasswordDirect()">저장</button>
            </div>
        </div>
    </div>

    <!-- Admin -->
    <div id="admin-panel" class="panel hidden">
        <div class="tabs">
            <span class="tab-link active" onclick="app.switchTab('admin', 'a-dash')">대시보드</span>
            <span class="tab-link" onclick="app.switchTab('admin', 'a-user')">인사/이수 관리</span>
            <span class="tab-link" onclick="app.switchTab('admin', 'a-train')">교육 등록</span>
        </div>

        <div id="tab-a-dash">
            <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px;">
                <div style="border:1px solid #eee; padding:15px; text-align:center;">총 직원<p id="st-u" style="font-size:20px; font-weight:900;">0</p></div>
                <div style="border:1px solid #eee; padding:15px; text-align:center;">활성 교육<p id="st-t" style="font-size:20px; font-weight:900;">0</p></div>
                <div style="border:1px solid #eee; padding:15px; text-align:center;">미수료<p id="st-w" style="font-size:20px; font-weight:900;">0</p></div>
                <div style="border:1px solid #eee; padding:15px; text-align:center;">수료완료<p id="st-d" style="font-size:20px; font-weight:900;">0</p></div>
            </div>
            <table id="admin-master-train-table"></table>
            <div id="admin-train-detail-box" class="hidden history-box">
                <h3 id="detail-train-title">신청자 상세 명단</h3>
                <table id="admin-train-app-table"></table>
            </div>
        </div>

        <div id="tab-a-user" class="hidden">
            <div class="admin-split" style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">
                <div style="border:1px solid #000; padding:15px;">
                    <h4>직원 개별 관리</h4>
                    <input type="text" id="u-id" placeholder="사번">
                    <input type="text" id="u-name" placeholder="성함">
                    <input type="text" id="u-dept" placeholder="소속">
                    <select id="u-role"><option value="user">일반</option><option value="admin">어드민</option></select>
                    <button class="btn btn-sm btn-full" onclick="app.adminSaveUser()">저장/수정</button>
                    <button class="btn btn-sm btn-outline btn-full" style="margin-top:5px;" onclick="app.clearUserForm()">입력창 초기화</button>
                </div>
                <div style="background:#f0f7ff; padding:15px; border:1px solid #cce5ff;">
                    <h4>📊 엑셀 일괄 동기화</h4>
                    <input type="file" id="excel-input" accept=".xlsx, .xls">
                    <button class="btn btn-excel btn-full" onclick="app.handleExcelUpload()">파일 업로드 및 동기화</button>
                </div>
            </div>
            <input type="text" id="u-search" placeholder="직원 검색 (이름/사번)..." onkeyup="app.renderAdminUserList()" style="width:100%; border:2px solid #000;">
            
            <!-- 이수관리/편집 패널 -->
            <div id="u-history-box" class="hidden history-box">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <h3 id="u-history-title"></h3>
                    <button class="btn btn-sm btn-outline" onclick="document.getElementById('u-history-box').classList.add('hidden')">닫기</button>
                </div>
                <div style="background:#fff; padding:10px; border:1px solid #ddd; margin-bottom:10px; display:flex; gap:10px;">
                    <select id="arch-select" style="flex:2; margin:0;"></select>
                    <button class="btn btn-sm" onclick="app.manualAddHistory()">강제 이력 추가</button>
                </div>
                <table id="u-history-table"></table>
            </div>
            <table id="admin-u-table"></table>
        </div>

        <div id="tab-a-train" class="hidden">
            <div class="admin-split" style="display:grid; grid-template-columns: 450px 1fr; gap:20px;">
                <div class="admin-form">
                    <h4>교육 과정 설정</h4>
                    <input type="hidden" id="edit-t-id">
                    <label style="font-weight:900;"><input type="checkbox" id="t-mandatory" onchange="app.toggleDeptSection()"> 의무교육 타겟팅</label>
                    <div id="dept-select-section" class="hidden">
                        <p style="font-size:11px; margin:5px 0;">대상 부서 선택</p>
                        <div id="dept-checkbox-list" class="dept-selector"></div>
                    </div>
                    <input type="text" id="t-title" placeholder="교육 명칭">
                    <select id="t-cat-sel"></select>
                    <input type="text" id="t-place" placeholder="장소">
                    <input type="number" id="t-quota" placeholder="세션당 정원">
                    <input type="date" id="t-dead" title="신청 마감일">
                    <div style="background:#f9f9f9; padding:15px; border:1px solid #ddd; margin-top:10px;">
                        <p style="font-weight:800; font-size:12px; margin-bottom:10px;">🕒 세션 빌더</p>
                        <input type="date" id="s-date">
                        <div style="display:flex; gap:5px;"><input type="time" id="s-start" style="flex:1;"><input type="time" id="s-end" style="flex:1;"></div>
                        <input type="number" id="s-break-val" placeholder="휴게시간 (h) 예: 0.5" step="0.5">
                        <button class="btn btn-sm btn-outline btn-full" onclick="app.addSessionToList()">+ 세션 추가</button>
                    </div>
                    <div id="added-sessions-box" style="margin:10px 0; font-size:11px; color:#666;"></div>
                    <button class="btn btn-full" onclick="app.saveTraining()" style="margin-top:10px;">최종 저장하기</button>
                </div>
                <div>
                    <h4>카테고리 관리</h4>
                    <div style="display:flex; gap:5px;"><input type="text" id="new-cat-input" style="width:150px;"><button class="btn btn-sm" onclick="app.addCategory()">+</button></div>
                    <div id="cat-tags-box" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Home -->
    <div id="main-content">
        <div class="section-header">
            <h2 class="section-title">COURSE CATALOG</h2>
            <select id="cat-filter" onchange="app.renderHome()" style="width:180px; font-weight:800; border:2px solid #000;"></select>
        </div>
        <div id="training-grid" class="grid"></div>
    </div>
</div>

<script>
    // ⚠️ 찬호 님의 Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyD-d8gTqhpFinzg-sACv-HKqPaFOKjhJAI",
        authDomain: "cr-store-edu-system.firebaseapp.com",
        projectId: "cr-store-edu-system",
        storageBucket: "cr-store-edu-system.firebasestorage.app",
        messagingSenderId: "663570679286",
        appId: "1:663570679286:web:96c91e668ab180ac9673d7",
        databaseURL: "https://cr-store-edu-system-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        tempSessions: [],
        state: { user: null, users: {}, trainings: [], apps: [], notices: [], cats: [], statusOptions: ["신청중", "신청완료", "이수완료", "미이수", "신청취소"] },

        init: function() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                this.state.users = data.users || { 'monster1246': { pw: '1234', role: 'admin', name: '마스터', isFirst: false } };
                this.state.trainings = data.trainings || [];
                this.state.apps = data.apps || [];
                this.state.notices = data.notices || [{text: "환영합니다! 교육 시스템입니다.", pin: true}];
                this.state.cats = data.cats || ["신규 교육", "제품 교육", "브랜드 스토리"];

                document.getElementById('loading-screen').classList.add('hidden');
                if(!this.state.user) document.getElementById('auth-overlay').classList.remove('hidden');
                else this.renderHome();
            });
        },

        save: function() {
            db.ref('/').update({
                users: this.state.users,
                trainings: this.state.trainings,
                apps: this.state.apps,
                notices: this.state.notices,
                cats: this.state.cats
            });
        },

        /* Auth & Onboarding */
        handleLogin: function() {
            const id = document.getElementById('login-id').value.trim();
            const pw = document.getElementById('login-pw').value.trim();
            const u = this.state.users[id];
            if(!u) return alert("등록되지 않은 사번입니다.");
            if(u.pw === pw) {
                this.state.user = id;
                if(u.isFirst) {
                    document.getElementById('auth-overlay').classList.add('hidden');
                    document.getElementById('onboarding-form').classList.remove('hidden');
                    document.getElementById('init-name').value = u.name || '';
                } else {
                    document.getElementById('auth-overlay').classList.add('hidden');
                    this.renderHome();
                }
            } else alert("비밀번호 불일치");
        },

        completeOnboarding: function() {
            const u = this.state.users[this.state.user];
            u.name = document.getElementById('init-name').value;
            u.dept = document.getElementById('init-dept').value;
            u.pos = document.getElementById('init-pos').value;
            u.pw = document.getElementById('init-pw').value;
            u.isFirst = false;
            this.save();
            document.getElementById('onboarding-form').classList.add('hidden');
            this.renderHome();
        },

        /* Navigation */
        goHome: function() { document.querySelectorAll('.panel').forEach(p=>p.classList.add('hidden')); document.getElementById('main-content').classList.remove('hidden'); },
        togglePanel: function(p) { document.querySelectorAll('.panel').forEach(el=>el.classList.add('hidden')); document.getElementById(p+'-panel').classList.remove('hidden'); document.getElementById('main-content').classList.add('hidden'); },
        switchTab: function(p, t) { 
            document.querySelectorAll(`#${p}-panel [id^="tab-"]`).forEach(x=>x.classList.add('hidden')); 
            document.getElementById('tab-'+t).classList.remove('hidden'); 
            document.querySelectorAll(`#${p}-panel .tab-link`).forEach(l=>l.classList.remove('active'));
            event.target.classList.add('active');
        },

        /* Home Rendering */
        renderHome: function() {
            const u = this.state.users[this.state.user];
            document.getElementById('display-user').innerText = `${u.name}님 환영합니다.`;
            if(u.role === 'admin') document.getElementById('admin-toggle-btn').classList.remove('hidden');

            const fCat = document.getElementById('cat-filter');
            fCat.innerHTML = `<option value="ALL">전체 카테고리</option>` + this.state.cats.map(c=>`<option value="${c}">${c}</option>`).join('');
            document.getElementById('t-cat-sel').innerHTML = this.state.cats.map(c=>`<option value="${c}">${c}</option>`).join('');
            document.getElementById('cat-tags-box').innerHTML = this.state.cats.map(c=>`<span class="badge" onclick="app.delCat('${c}')">${c} ✕</span>`).join('');
            
            const depts = [...new Set(Object.values(this.state.users).map(u=>u.dept))].filter(d=>d);
            document.getElementById('dept-checkbox-list').innerHTML = depts.map(d=>`<label style="display:block;"><input type="checkbox" class="dept-check" value="${d}"> ${d}</label>`).join('');

            const filtered = this.state.trainings.filter(t=>t.active);
            document.getElementById('training-grid').innerHTML = filtered.map(t => {
                const count = this.state.apps.filter(a=>a.tId==t.id && a.status !== '신청취소').length;
                const isMandatory = t.isMandatory && t.targetDepts && t.targetDepts.includes(u.dept);
                return `<div class="card">
                    ${isMandatory ? `<div class="mandatory-tag">REQUIRED</div>` : ''}
                    <div class="card-content">
                        <p class="badge">${t.cat}</p>
                        <h3 style="margin-top:10px;">${t.title}</h3>
                        <p class="meta" style="margin-top:10px; font-size:11px; color:#666;">
                            📍 ${t.place}<br>👥 신청현황: ${count}명<br>
                            📅 <select id="s-select-${t.id}">${t.sessions.map(s=>`<option value="${s.date}">${s.date} ${s.start}(${s.total}h)</option>`).join('')}</select>
                        </p>
                    </div>
                    <button class="btn btn-full" onclick="app.apply(${t.id})">신청하기</button>
                </div>`;
            }).join('');
            
            const pin = this.state.notices.find(n=>n.pin) || this.state.notices[0];
            document.getElementById('notice-text').innerText = pin ? pin.text : "공지사항 없음";
            
            this.renderAdminUserList();
            this.renderAdminDashboard();
            this.renderMyPage();
        },

        /* Admin - User & History */
        renderAdminUserList: function() {
            const q = document.getElementById('u-search').value.toLowerCase();
            const fids = Object.keys(this.state.users).filter(id => id.includes(q) || this.state.users[id].name.toLowerCase().includes(q));
            document.getElementById('admin-u-table').innerHTML = `<thead><tr><th>사번</th><th>성함</th><th>소속</th><th>관리</th></tr></thead><tbody>` + 
                fids.map(id => `<tr><td>${id}</td><td>${this.state.users[id].name}</td><td>${this.state.users[id].dept || '-'}</td><td>
                <button class="btn btn-sm btn-outline" onclick="app.showHistory('${id}')">이수관리</button>
                <button class="btn btn-sm btn-danger" onclick="app.deleteUser('${id}')">X</button></td></tr>`).join('') + `</tbody>`;
            document.getElementById('arch-select').innerHTML = `<option value="">교육 선택</option>` + this.state.trainings.map(t=>`<option value="${t.id}">${t.title}</option>`).join('');
        },

        showHistory: function(id) {
            this.targetUser = id;
            document.getElementById('u-history-box').classList.remove('hidden');
            document.getElementById('u-history-title').innerText = `${this.state.users[id].name} 님 수강 이력`;
            const h = this.state.apps.filter(a => a.uId == id);
            document.getElementById('u-history-table').innerHTML = `<thead><tr><th>교육명</th><th>상태</th><th>수정</th><th>삭제</th></tr></thead><tbody>` + 
                h.map(x => `<tr><td>${x.tTitle}</td><td><span class="badge">${x.status}</span></td><td>
                <select onchange="app.statusChange(${x.tId},'${x.uId}',this.value)">${this.state.statusOptions.map(opt=>`<option value="${opt}" ${x.status===opt?'selected':''}>${opt}</option>`).join('')}</select>
                </td><td><button class="btn btn-sm btn-danger" onclick="app.delH(${x.tId},'${x.uId}')">X</button></td></tr>`).join('') + `</tbody>`;
        },

        manualAddHistory: function() {
            const tId = document.getElementById('arch-select').value;
            if(!tId || !this.targetUser) return alert("선택 필수");
            const t = this.state.trainings.find(i=>i.id == tId);
            this.state.apps.push({ tId: t.id, tTitle: t.title, uId: this.targetUser, uName: this.state.users[this.targetUser].name, status: '이수완료', date: t.sessions[0].date });
            this.save(); this.showHistory(this.targetUser);
        },

        /* Admin - Education & Session */
        addSessionToList: function() {
            const d = document.getElementById('s-date').value, s = document.getElementById('s-start').value, e = document.getElementById('s-end').value, bVal = parseFloat(document.getElementById('s-break-val').value || 0);
            if(!d || !s || !e) return alert("일시 입력 필수");
            const total = ((new Date(`2000-01-01T${e}`) - new Date(`2000-01-01T${s}`)) / 3600000 - bVal).toFixed(1);
            this.tempSessions.push({ date: d, start: s, end: e, total });
            this.renderTempSessions();
        },

        renderTempSessions: function() {
            document.getElementById('added-sessions-box').innerHTML = this.tempSessions.map(s=>`<div>📅 ${s.date} | ${s.start}~${s.end} (${s.total}h)</div>`).join('');
        },

        saveTraining: function() {
            const depts = Array.from(document.querySelectorAll('.dept-check:checked')).map(c=>c.value);
            const data = {
                id: Date.now(), title: document.getElementById('t-title').value, cat: document.getElementById('t-cat-sel').value,
                place: document.getElementById('t-place').value, quota: document.getElementById('t-quota').value,
                isMandatory: document.getElementById('t-mandatory').checked, targetDepts: depts,
                sessions: [...this.tempSessions], active: true
            };
            if(!data.title || data.sessions.length === 0) return alert("교육명과 세션을 확인하세요.");
            this.state.trainings.unshift(data);
            this.save(); this.tempSessions = []; this.renderTempSessions(); alert("저장 완료");
        },

        /* Dashboard Stats */
        renderAdminDashboard: function() {
            document.getElementById('st-u').innerText = Object.keys(this.state.users).length;
            document.getElementById('st-t').innerText = this.state.trainings.length;
            document.getElementById('st-w').innerText = this.state.apps.filter(a=>a.status === '신청중').length;
            document.getElementById('st-d').innerText = this.state.apps.filter(a=>a.status === '이수완료').length;
            document.getElementById('admin-master-train-table').innerHTML = `<thead><tr><th>교육명</th><th>관리</th></tr></thead><tbody>` + 
                this.state.trainings.map(t=>`<tr><td>${t.title}</td><td><button class="btn btn-sm btn-danger" onclick="app.deleteTraining(${t.id})">삭제</button></td></tr>`).join('') + `</tbody>`;
        },

        /* Excel & Utilities */
        handleExcelUpload: function() {
            const fi = document.getElementById('excel-input'), file = fi.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                for(let i = 1; i < rows.length; i++) {
                    const id = String(rows[i][0]).trim(), name = rows[i][1], dept = rows[i][2];
                    if(id && !this.state.users[id]) this.state.users[id] = { pw: '1234', isFirst: true, role: 'user', name, dept };
                    else if(id) { this.state.users[id].name = name; this.state.users[id].dept = dept; }
                }
                this.save(); alert("엑셀 데이터 동기화가 완료되었습니다.");
            };
            reader.readAsArrayBuffer(file);
        },

        apply: function(tId) {
            const v = document.getElementById(`s-select-${tId}`).value;
            if(this.state.apps.find(a=>a.tId==tId && a.uId==this.state.user)) return alert("이미 신청한 교육입니다.");
            const t = this.state.trainings.find(i=>i.id==tId);
            this.state.apps.push({ tId, tTitle: t.title, uId: this.state.user, uName: this.state.users[this.state.user].name, status: '신청중', date: v });
            this.save(); alert("신청 완료!");
        },

        renderMyPage: function() {
            document.getElementById('my-apps-table').innerHTML = `<thead><tr><th>교육명</th><th>상태</th></tr></thead><tbody>` + 
                this.state.apps.filter(a=>a.uId==this.state.user).map(a=>`<tr><td>${a.tTitle}</td><td><span class="badge">${a.status}</span></td></tr>`).join('') + `</tbody>`;
        },

        /* Common Actions */
        statusChange: function(tId,uId,ns) { const idx = this.state.apps.findIndex(a=>a.tId==tId && a.uId==uId); if(idx>-1) { this.state.apps[idx].status = ns; this.save(); }},
        delH: function(tId,uId) { if(confirm("이력을 삭제하시겠습니까?")) { this.state.apps = this.state.apps.filter(a=>!(a.tId==tId && a.uId==uId)); this.save(); this.showHistory(uId); }},
        adminSaveUser: function() { const id = document.getElementById('u-id').value; if(!id) return alert("사번 입력"); this.state.users[id] = { pw: '1234', name: document.getElementById('u-name').value, dept: document.getElementById('u-dept').value, role: document.getElementById('u-role').value, isFirst: true }; this.save(); alert("저장됨"); },
        deleteUser: function(id) { if(confirm("유저를 삭제하시겠습니까?")) { delete this.state.users[id]; this.save(); }},
        deleteTraining: function(id) { if(confirm("교육과 신청 데이터를 모두 삭제할까요?")) { this.state.trainings = this.state.trainings.filter(t=>t.id!==id); this.state.apps = this.state.apps.filter(a=>a.tId!==id); this.save(); }},
        addCategory: function() { const v = document.getElementById('new-cat-input').value; if(v) { this.state.cats.push(v); this.save(); }},
        delCat: function(c) { this.state.cats = this.state.cats.filter(i=>i!==c); this.save(); },
        toggleDeptSection: function() { document.getElementById('dept-select-section').classList.toggle('hidden', !document.getElementById('t-mandatory').checked); },
        changePasswordDirect: function() { const pw = document.getElementById('my-new-pw').value; if(pw.length < 4) return alert("4자 이상 입력"); this.state.users[this.state.user].pw = pw; this.save(); alert("변경 완료"); }
    };

    app.init();
</script>
</body>
</html>
