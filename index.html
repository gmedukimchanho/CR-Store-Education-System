<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CR EDUCATION SYSTEM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <!-- Firebase & Excel SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --bg: #fff; --text: #000; --border: #000; --gray: #888; --light: #f9f9f9; --accent: #ff4d4d; --blue: #0066cc; --green: #217346; --safe: #2ecc71; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* UI Components */
        .btn { border: 1px solid var(--border); background: #000; color: #fff; padding: 12px 18px; cursor: pointer; font-weight: 800; font-size: 11px; letter-spacing: 1px; transition: 0.2s; text-transform: uppercase; text-align: center; border-radius: 0; }
        .btn:hover { background: #fff; color: #000; }
        .btn-sm { padding: 6px 12px; font-size: 10px; }
        .btn-outline { background: #fff; color: #000; }
        .btn-danger { border-color: var(--accent); color: var(--accent); background: #fff; }
        .btn-blue { border-color: var(--blue); color: var(--blue); background: #fff; }
        .btn-excel { border-color: var(--green); color: var(--green); background: #fff; }
        .btn-full { width: 100%; display: block; }
        
        input, select, textarea { background: #fff; border: 1px solid #ddd; padding: 12px; width: 100%; margin-bottom: 10px; font-size: 14px; border-radius: 0; outline: none; }
        input:focus { border-color: #000; }

        header { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #000; position: sticky; top: 0; background: #fff; z-index: 100; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 50px; }
        .section-header { margin: 40px 0 20px 0; border-bottom: 3px solid #000; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 15px; }

        /* Progress Bar */
        .progress-wrap { background: #eee; height: 10px; width: 100%; margin: 10px 0 30px 0; }
        .progress-fill { background: var(--safe); height: 100%; transition: 0.5s; width: 0%; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { border: 1px solid #eee; min-height: 440px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: #000; box-shadow: 0 15px 40px rgba(0,0,0,0.08); }
        .card-content { padding: 25px; flex-grow: 1; }
        .mandatory-tag { background: var(--accent); color: #fff; padding: 4px 10px; font-size: 10px; font-weight: 900; position: absolute; top: 15px; left: 15px; z-index: 10; }

        .panel { margin-top: 30px; border: 1px solid #000; padding: 30px; background: #fff; }
        .tabs { display: flex; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid #eee; overflow-x: auto; }
        .tab-link { font-size: 11px; font-weight: 800; color: #ccc; cursor: pointer; white-space: nowrap; padding-bottom: 15px; }
        .tab-link.active { color: #000; border-bottom: 3px solid #000; }
        
        .table-wrapper { width: 100%; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { border: 1px solid #eee; padding: 14px; text-align: left; font-size: 12px; }
        th { background: #f9f9f9; font-weight: 800; }
        .badge { padding: 3px 6px; font-size: 9px; font-weight: 800; border: 1px solid #000; display: inline-block; }
        
        .intern-photo { width: 50px; height: 65px; object-fit: cover; border: 1px solid #ddd; }
        .stats-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-item { border: 1px solid #000; padding: 20px; text-align: center; }
        .stat-item p { font-size: 24px; font-weight: 900; margin-top: 5px; }

        @media (max-width: 768px) {
            header { padding: 15px 20px; flex-direction: column; gap: 15px; }
            .container { padding: 20px; }
            .grid { grid-template-columns: 1fr; }
            .admin-split { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body>

<div id="loading-screen" style="position:fixed; inset:0; background:#fff; z-index:10000; display:flex; align-items:center; justify-content:center; font-weight:900;">CR EDUCATION SYSTEM SYNC...</div>

<!-- ONLY Login Visible Initially -->
<div id="auth-overlay" class="hidden" style="position:fixed; inset:0; background:#fff; z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div class="auth-box" style="width:100%; max-width:360px; text-align:center;">
        <h1 style="margin-bottom:40px; font-size: 32px; font-weight: 900; letter-spacing: -2px;">CR<br>EDUCATION</h1>
        <input type="text" id="login-id" placeholder="사번">
        <input type="password" id="login-pw" placeholder="비밀번호">
        <button class="btn btn-full" onclick="app.handleLogin()">SIGN IN</button>
        <p style="font-size:11px; color:#aaa; margin-top:20px;">CR STORE 전용 통합 교육망</p>
    </div>
</div>

<div id="onboarding-form" class="hidden" style="position:fixed; inset:0; background:#fff; z-index:10001; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div class="auth-box" style="width:100%; max-width:360px;">
        <h2 style="margin-bottom:20px; font-weight:900;">정보 확인 및 비번 설정</h2>
        <input type="text" id="init-name" placeholder="성함">
        <input type="text" id="init-dept" placeholder="소속 (매장명)">
        <select id="init-pos">
            <option value="">직급/직책 선택</option>
            <option value="팀원">팀원</option><option value="부매니저">부매니저</option><option value="매니저">매니저</option><option value="팀장">팀장</option><option value="인턴">인턴</option>
        </select>
        <input type="password" id="init-pw" placeholder="새 비밀번호 (4자 이상)">
        <input type="password" id="init-pw-confirm" placeholder="비밀번호 확인">
        <button class="btn btn-full" onclick="app.completeOnboarding()">정보 저장 및 시작</button>
    </div>
</div>

<!-- Main System UI -->
<div id="main-ui" class="hidden">
    <header>
        <h1 onclick="app.goHome()">CR EDUCATION</h1>
        <div class="nav-info">
            <span id="display-user" style="font-size:12px; font-weight:800; border-bottom:1px solid #000;"></span>
            <button class="btn btn-outline btn-sm" onclick="app.togglePanel('mypage')">MY PAGE</button>
            <button id="admin-toggle-btn" class="btn btn-outline btn-sm hidden" onclick="app.togglePanel('admin')">ADMIN</button>
            <button class="btn btn-sm" onclick="location.reload()" style="background:none; border:none; color:#aaa;">LOGOUT</button>
        </div>
    </header>

    <div class="container">
        <div id="notice-bar-top" class="notice-bar" style="background:var(--light); padding:18px 25px; border-left:10px solid #000; margin-bottom:40px; cursor:pointer;" onclick="app.togglePanel('mypage')">
            <span style="font-weight:900; color:var(--accent); margin-right:15px;">NOTICE</span> <span id="notice-text">정보 동기화 완료.</span>
        </div>

        <!-- Mypage -->
        <div id="mypage-panel" class="panel hidden">
            <div class="tabs">
                <span class="tab-link active" onclick="app.switchTab('mypage', 'my-apps')">학습 현황</span>
                <span class="tab-link" onclick="app.switchTab('mypage', 'my-account')">회원 정보</span>
            </div>
            <div id="tab-my-apps"><div class="table-wrapper"><table id="my-apps-table"></table></div></div>
            <div id="tab-my-account" class="hidden">
                <div style="max-width:300px;">
                    <p id="my-profile-display" style="margin-bottom:15px; font-weight:700; font-size:13px;"></p>
                    <input type="password" id="my-new-pw" placeholder="비밀번호 변경">
                    <button class="btn btn-sm btn-full" onclick="app.changePasswordDirect()">저장</button>
                </div>
            </div>
        </div>

        <!-- Admin -->
        <div id="admin-panel" class="panel hidden">
            <div class="tabs">
                <span class="tab-link active" onclick="app.switchTab('admin', 'a-dash')">대시보드</span>
                <span class="tab-link" onclick="app.switchTab('admin', 'a-user')">인사 관리</span>
                <span class="tab-link" onclick="app.switchTab('admin', 'a-intern')">인턴 정보 관리</span>
                <span class="tab-link" onclick="app.switchTab('admin', 'a-train')">교육 빌더</span>
            </div>

            <div id="tab-a-dash">
                <div class="stats-box" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;">
                    <div class="stat-item">유저<p id="st-u">0</p></div>
                    <div class="stat-item">교육<p id="st-t">0</p></div>
                    <div class="stat-item">대기<p id="st-w">0</p></div>
                    <div class="stat-item">이수완료<p id="st-d">0</p></div>
                </div>
                <div class="table-wrapper"><table id="admin-master-train-table"></table></div>
                <div id="admin-train-detail-box" class="hidden" style="margin-top:20px; border:2px solid #000; padding:20px;">
                    <h3 id="detail-train-title">신청자 명단</h3>
                    <table id="admin-train-app-table"></table>
                </div>
            </div>

            <div id="tab-a-user" class="hidden">
                <div class="admin-split" style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">
                    <div style="border:1px solid #000; padding:15px;">
                        <h4 id="u-edit-mode">개별 인사 정보 수정 (사번변경 가능)</h4>
                        <input type="hidden" id="old-u-id">
                        <input type="text" id="u-id" placeholder="사번 (ID)">
                        <input type="text" id="u-name" placeholder="성함">
                        <input type="text" id="u-dept" placeholder="소속">
                        <select id="u-pos">
                            <option value="팀원">팀원</option><option value="부매니저">부매니저</option><option value="매니저">매니저</option><option value="팀장">팀장</option><option value="인턴">인턴</option>
                        </select>
                        <select id="u-role"><option value="user">일반</option><option value="admin">어드민</option></select>
                        <button class="btn btn-sm btn-full" onclick="app.adminSaveUser()">저장 및 사번동기화</button>
                        <button class="btn btn-sm btn-outline btn-full" style="margin-top:5px;" onclick="app.clearUserForm()">취소</button>
                    </div>
                    <div style="background:#f0f7ff; padding:15px;">
                        <h4>📊 엑셀 일괄 동기화</h4>
                        <input type="file" id="excel-input" accept=".xlsx, .xls">
                        <button class="btn btn-excel btn-full" onclick="app.handleExcelUpload()">인사 업로드</button>
                    </div>
                </div>
                <input type="text" id="u-search" placeholder="통합 검색 (이름/사번/매장)..." onkeyup="app.renderAdminUserList()" style="width:100%; border:2px solid #000;">
                <div id="u-history-box" class="hidden" style="border:2px solid #000; padding:20px; margin-top:10px;">
                    <h3 id="u-history-title"></h3>
                    <div style="margin:10px 0; display:flex; gap:10px;">
                        <select id="arch-select" style="flex:2; margin:0;"></select>
                        <button class="btn btn-sm" onclick="app.manualAddHistory()">이력 강제추가</button>
                    </div>
                    <table id="u-history-table"></table>
                </div>
                <div class="table-wrapper"><table id="admin-u-table"></table></div>
            </div>

            <!-- Intern Management System -->
            <div id="tab-a-intern" class="hidden">
                <div style="display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;">
                    <select id="intern-type" style="width:130px; margin:0; font-weight:900;" onchange="app.renderInternDashboard()">
                        <option value="CR">CR</option><option value="TAM">TAM</option><option value="ATS">ATS</option><option value="NUF">NUF</option>
                    </select>
                    <select id="intern-year" style="width:110px; margin:0;" onchange="app.renderInternDashboard()">
                        <option value="2026">2026</option><option value="2025">2025</option>
                    </select>
                    <input type="text" id="intern-search" placeholder="인턴 이름 검색..." onkeyup="app.renderInternList()" style="width:200px; margin:0; border:2px solid #000;">
                    <button class="btn btn-sm" onclick="app.showInternForm()">+ 신규 등록</button>
                    <button class="btn btn-sm btn-excel" onclick="document.getElementById('intern-excel-input').click()">엑셀 업로드</button>
                    <input type="file" id="intern-excel-input" class="hidden" accept=".xlsx, .xls" onchange="app.handleInternExcel(this)">
                </div>

                <div id="intern-dash" class="stats-box"></div>

                <div id="intern-form-box" class="hidden" style="background:#f9f9f9; border:2px solid #000; padding:25px; margin-bottom:20px;">
                    <h3 id="intern-form-title">인턴 정보 관리</h3>
                    <div style="display:grid; grid-template-columns: 150px 1fr; gap:20px; margin-top:15px;">
                        <div style="text-align:center;">
                            <img id="intern-photo-preview" class="intern-photo" style="width:130px; height:160px; display:block; margin:0 auto 10px;">
                            <input type="file" id="intern-photo-input" accept="image/*" onchange="app.previewPhoto(this)" style="font-size:10px;">
                        </div>
                        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
                            <input type="text" id="in-name" placeholder="이름 (필수)">
                            <input type="text" id="in-entry" placeholder="입사월 (26-03)">
                            <input type="text" id="in-final-m" placeholder="최종월">
                            <input type="text" id="in-region" placeholder="지역">
                            <input type="text" id="in-plat" placeholder="플랫폼">
                            <input type="date" id="in-contract-s" title="계약 시작">
                            <input type="date" id="in-interview-1" title="1개월 면담">
                            <input type="date" id="in-contract-e" title="계약 종료">
                            <input type="date" id="in-contract-ext" title="연장 종료">
                            <input type="date" id="in-final-int" title="최종 면접">
                            <input type="date" id="in-full-date" title="정직원 전환">
                            <input type="date" id="in-out-date" title="퇴사일">
                            <input type="text" id="in-place1" placeholder="근무지 1차">
                            <input type="text" id="in-place2" placeholder="근무지 2차">
                            <input type="text" id="in-contact" placeholder="연락처">
                            <input type="text" id="in-school-yn" placeholder="재학여부">
                            <input type="text" id="in-school-name" placeholder="학교명">
                            <select id="in-status">
                                <option value="지원자">지원자</option><option value="최종합격">최종합격</option><option value="퇴사">퇴사</option><option value="파트지원">파트지원</option><option value="파트합격">파트합격</option>
                            </select>
                            <textarea id="in-address" placeholder="주소" style="grid-column: span 3;"></textarea>
                            <textarea id="in-memo" placeholder="특이사항" style="grid-column: span 3; height:60px;"></textarea>
                        </div>
                    </div>
                    <div style="margin-top:20px; display:flex; gap:10px;">
                        <button class="btn btn-full" onclick="app.saveIntern()">데이터 저장</button>
                        <button class="btn btn-outline btn-full" onclick="document.getElementById('intern-form-box').classList.add('hidden')">닫기</button>
                    </div>
                </div>
                <div class="table-wrapper"><table id="intern-table"></table></div>
            </div>

            <div id="tab-a-train" class="hidden">
                <div class="admin-split" style="display:grid; grid-template-columns: 450px 1fr; gap:30px;">
                    <div style="border:1px solid #000; padding:20px;">
                        <h4>교육 과정 빌더</h4>
                        <input type="hidden" id="edit-t-id">
                        <label><input type="checkbox" id="t-mandatory" onchange="app.toggleDeptSection()"> 의무교육 타겟팅</label>
                        <div id="dept-select-section" class="hidden"><div id="dept-checkbox-list" class="dept-selector" style="max-height:100px; overflow-y:auto; border:1px solid #eee; padding:5px;"></div></div>
                        <input type="text" id="t-title" placeholder="교육명">
                        <select id="t-cat-sel"></select>
                        <input type="text" id="t-place" placeholder="장소">
                        <input type="text" id="t-survey" placeholder="설문 링크">
                        <input type="number" id="t-quota" placeholder="정원">
                        <input type="date" id="t-dead" title="마감일">
                        <div style="background:#f9f9f9; padding:10px; border:1px solid #ddd; margin-top:10px;">
                            <p style="font-weight:800; font-size:11px;">🕒 세션 빌더</p>
                            <input type="date" id="s-date">
                            <div style="display:flex; gap:5px;"><input type="time" id="s-start" style="flex:1;"><input type="time" id="s-end" style="flex:1;"></div>
                            <input type="number" id="s-break" placeholder="휴게시간(h)" step="0.5">
                            <button class="btn btn-sm btn-outline btn-full" onclick="app.addSessionToList()">+ 추가</button>
                        </div>
                        <div id="added-sessions-box" style="font-size:11px; margin:10px 0;"></div>
                        <button class="btn btn-full" onclick="app.saveTraining()">최종 저장</button>
                    </div>
                    <div>
                        <h4>카테고리 관리</h4>
                        <div style="display:flex; gap:5px;"><input type="text" id="new-cat-input"><button class="btn btn-sm" onclick="app.addCategory()">+</button></div>
                        <div id="cat-tags-box" style="margin-top:10px; display:flex; flex-wrap:wrap; gap:5px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="main-content">
            <div id="progress-section">
                <span style="font-size:11px; font-weight:800;">MY MANDATORY PROGRESS</span>
                <div class="progress-wrap"><div id="main-progress-bar" class="progress-fill"></div></div>
            </div>
            <div class="section-header">
                <h2>CR CATALOG</h2>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="course-search" placeholder="교육 검색..." onkeyup="app.renderHome()" style="width:200px; margin:0; border:2px solid #000;">
                    <select id="cat-filter" onchange="app.renderHome()" style="width:150px; margin:0; font-weight:900; border:2px solid #000;"></select>
                </div>
            </div>
            <div id="training-grid" class="grid"></div>
        </div>
    </div>
</div>

<script>
    // ⚠️ Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyD-d8gTqhpFinzg-sACv-HKqPaFOKjhJAI",
        authDomain: "cr-store-edu-system.firebaseapp.com",
        projectId: "cr-store-edu-system",
        storageBucket: "cr-store-edu-system.firebasestorage.app",
        messagingSenderId: "663570679286",
        appId: "1:663570679286:web:96c91e668ab180ac9673d7",
        databaseURL: "https://cr-store-edu-system-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        tempSessions: [], targetUser: null, currentPhoto: null,
        state: { user: null, users: {}, trainings: [], apps: [], notices: [], cats: [], interns: {}, statusOptions: ["신청중", "신청완료", "이수완료", "미이수", "신청취소"] },

        init: function() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                this.state.users = data.users || { 'monster1246': { pw: '1234', role: 'admin', name: '마스터', isFirst: false, dept: 'HQ' } };
                this.state.trainings = data.trainings || [];
                this.state.apps = data.apps || [];
                this.state.notices = data.notices || [{text: "CR EDUCATION SYSTEM 가동 중", pin: true}];
                this.state.cats = data.cats || ["BRAND", "PRODUCT", "CS"];
                this.state.interns = data.interns || {};

                document.getElementById('loading-screen').classList.add('hidden');
                if(!this.state.user) {
                    document.getElementById('auth-overlay').classList.remove('hidden');
                    document.getElementById('main-ui').classList.add('hidden');
                } else {
                    this.renderHome();
                }
            });
        },

        save: function() {
            db.ref('/').update({ users: this.state.users, trainings: this.state.trainings, apps: this.state.apps, notices: this.state.notices, cats: this.state.cats, interns: this.state.interns });
        },

        /* Auth Core */
        handleLogin: function() {
            const id = document.getElementById('login-id').value.trim(), pw = document.getElementById('login-pw').value.trim(), u = this.state.users[id];
            if(!u) return alert("등록되지 않은 사번입니다.");
            if(u.pw === pw) {
                this.state.user = id;
                document.getElementById('auth-overlay').classList.add('hidden');
                document.getElementById('main-ui').classList.remove('hidden');
                if(u.isFirst) {
                    document.getElementById('onboarding-form').classList.remove('hidden');
                    document.getElementById('init-name').value = u.name || '';
                } else this.renderHome();
            } else alert("비번 오류");
        },

        completeOnboarding: function() {
            const u = this.state.users[this.state.user];
            const name = document.getElementById('init-name').value, dept = document.getElementById('init-dept').value, pos = document.getElementById('init-pos').value, pw = document.getElementById('init-pw').value;
            if(!name || !dept || !pos || pw.length < 4 || pw !== document.getElementById('init-pw-confirm').value) return alert("입력 정보 확인");
            Object.assign(u, { name, dept, pos, pw, isFirst: false });
            this.save(); document.getElementById('onboarding-form').classList.add('hidden'); this.renderHome();
        },

        /* Admin - 사번 변경 & 이력 동기화 (Crucial Logic) */
        adminSaveUser: function() {
            const oldId = document.getElementById('old-u-id').value;
            const newId = document.getElementById('u-id').value.trim();
            if(!newId) return alert("사번 필수");

            if(oldId && oldId !== newId) {
                if(this.state.users[newId]) return alert("이미 존재하는 사번입니다.");
                this.state.users[newId] = { ...this.state.users[oldId] };
                delete this.state.users[oldId];
                // 🔥 모든 이력 사번 강제 치환
                this.state.apps.forEach(a => { if(a.uId === oldId) a.uId = newId; });
                if(this.state.user === oldId) this.state.user = newId; // 본인인 경우 세션 유지
            } else if(!oldId && !this.state.users[newId]) {
                this.state.users[newId] = { pw: '1234', isFirst: true, role: 'user' };
            }

            Object.assign(this.state.users[newId], { name: document.getElementById('u-name').value, dept: document.getElementById('u-dept').value, pos: document.getElementById('u-pos').value, role: document.getElementById('u-role').value });
            this.save(); alert("인사 정보 동기화 완료"); this.clearUserForm();
        },

        resetUserPw: function(id) {
            if(confirm("1234로 초기화하고 최초 설정 모드로 바꿀까요?")) {
                this.state.users[id].pw = '1234'; this.state.users[id].isFirst = true; this.save(); alert("초기화 완료");
            }
        },

        /* Intern Master Logic */
        renderInternDashboard: function() {
            const type = document.getElementById('intern-type').value, year = document.getElementById('intern-year').value;
            const list = (this.state.interns[type] && this.state.interns[type][year]) ? this.state.interns[type][year] : [];
            const total = list.length, final = list.filter(i=>i.status==='최종합격').length, p_apply = list.filter(i=>i.status==='파트지원').length, p_pass = list.filter(i=>i.status==='파트합격').length;
            document.getElementById('intern-dash').innerHTML = `
                <div class="stat-item">전체 인원<p>${total}</p></div>
                <div class="stat-item">최종합격<p>${final} (${total?Math.round(final/total*100):0}%)</p></div>
                <div class="stat-item">파트지원<p>${p_apply}</p></div>
                <div class="stat-item">파트합격<p>${p_pass} (${p_apply?Math.round(p_pass/p_apply*100):0}%)</p></div>`;
            this.renderInternList();
        },

        showInternForm: function(idx = null) {
            this.targetInternIdx = idx;
            document.getElementById('intern-form-box').classList.remove('hidden');
            if(idx !== null) {
                const type = document.getElementById('intern-type').value, year = document.getElementById('intern-year').value;
                const data = this.state.interns[type][year][idx];
                ['name','entry','final-m','region','plat','contract-s','interview-1','contract-e','contract-ext','final-int','full-date','out-date','place1','place2','contact','school-yn','school-name','address','memo','status'].forEach(k=>document.getElementById('in-'+k).value = data[k] || '');
                document.getElementById('intern-photo-preview').src = data.photo || '';
                this.currentPhoto = data.photo || null;
            } else {
                document.querySelectorAll('#intern-form-box input, #intern-form-box textarea').forEach(i=>i.value='');
                document.getElementById('intern-photo-preview').src = '';
                this.currentPhoto = null;
            }
        },

        previewPhoto: function(input) {
            const reader = new FileReader();
            reader.onload = e => { this.currentPhoto = e.target.result; document.getElementById('intern-photo-preview').src = e.target.result; };
            reader.readAsDataURL(input.files[0]);
        },

        saveIntern: function() {
            const type = document.getElementById('intern-type').value, year = document.getElementById('intern-year').value;
            if(!this.state.interns[type]) this.state.interns[type] = {};
            if(!this.state.interns[type][year]) this.state.interns[type][year] = [];
            const data = { photo: this.currentPhoto };
            ['name','entry','final-m','region','plat','contract-s','interview-1','contract-e','contract-ext','final-int','full-date','out-date','place1','place2','contact','school-yn','school-name','address','memo','status'].forEach(k=>data[k] = document.getElementById('in-'+k).value);
            if(!data.name) return alert("이름 필수");
            if(this.targetInternIdx !== null) this.state.interns[type][year][this.targetInternIdx] = data;
            else this.state.interns[type][year].push(data);
            this.save(); alert("저장됨"); document.getElementById('intern-form-box').classList.add('hidden');
        },

        renderInternList: function() {
            const type = document.getElementById('intern-type').value, year = document.getElementById('intern-year').value, q = document.getElementById('intern-search').value.toLowerCase();
            const list = (this.state.interns[type] && this.state.interns[type][year]) ? this.state.interns[type][year] : [];
            document.getElementById('intern-table').innerHTML = `<thead><tr><th>사진</th><th>이름</th><th>1차근무지</th><th>연락처</th><th>상태</th><th>관리</th></tr></thead><tbody>` + 
                list.map((i,idx) => i.name.includes(q) ? `<tr><td><img src="${i.photo||''}" class="intern-photo"></td><td>${i.name}</td><td>${i.place1}</td><td>${i.contact}</td><td>${i.status}</td><td><button class="btn btn-sm btn-outline" onclick="app.showInternForm(${idx})">수정</button><button class="btn btn-sm btn-danger" onclick="app.delIntern(${idx})">X</button></td></tr>` : '').join('') + `</tbody>`;
        },

        /* Standard & Home Logic */
        renderHome: function() {
            const u = this.state.users[this.state.user];
            document.getElementById('display-user').innerText = `${u.name} / ${u.pos}`;
            if(u.role === 'admin') document.getElementById('admin-toggle-btn').classList.remove('hidden');
            
            document.getElementById('cat-filter').innerHTML = `<option value="ALL">전체 카테고리</option>` + this.state.cats.map(c=>`<option value="${c}">${c}</option>`).join('');
            document.getElementById('t-cat-sel').innerHTML = this.state.cats.map(c=>`<option value="${c}">${c}</option>`).join('');
            document.getElementById('cat-tags-box').innerHTML = this.state.cats.map(c=>`<span class="badge" onclick="app.delCat('${c}')" style="cursor:pointer;">${c} ✕</span>`).join('');
            const aD = [...new Set(Object.values(this.state.users).map(u=>u.dept))].filter(d=>d);
            document.getElementById('dept-checkbox-list').innerHTML = aD.map(d=>`<label style="display:block;"><input type="checkbox" class="dept-check" value="${d}"> ${d}</label>`).join('');

            // Progress Bar Logic
            const mandatory = this.state.trainings.filter(t=>t.isMandatory && t.targetDepts.includes(u.dept));
            const completed = mandatory.filter(t=>this.state.apps.find(a=>a.tId==t.id && a.uId==this.state.user && a.status=='이수완료')).length;
            document.getElementById('main-progress-bar').style.width = mandatory.length ? (completed/mandatory.length*100) + '%' : '100%';

            const sq = document.getElementById('course-search').value.toLowerCase(), cf = document.getElementById('cat-filter').value;
            document.getElementById('training-grid').innerHTML = this.state.trainings.filter(t=>t.title.toLowerCase().includes(sq) && (cf==='ALL'||t.cat===cf)).map(t => `<div class="card">${(t.isMandatory && t.targetDepts.includes(u.dept))?'<div class="mandatory-tag">REQUIRED</div>':''}<div class="card-content"><p class="badge">${t.cat}</p><h3 style="margin-top:15px;">${t.title}</h3><p style="font-size:12px; margin-top:10px;">📍 ${t.place}</p></div><button class="btn btn-full" onclick="app.apply(${t.id})">신청하기</button></div>`).join('');
            document.getElementById('notice-text').innerText = this.state.notices[0].text;
            this.renderAdminDashboard(); this.renderInternDashboard(); this.renderAdminUserList(); this.renderMyPage();
        },

        /* Utilities & Excel */
        handleExcelUpload: function() {
            const fi = document.getElementById('excel-input'), file = fi.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                for(let i = 1; i < rows.length; i++) {
                    const id = String(rows[i][0]).trim(), name = rows[i][1], dept = rows[i][2];
                    if(id && !this.state.users[id]) this.state.users[id] = { pw: '1234', isFirst: true, role: 'user', name, dept, pos: '미설정' };
                    else if(id) { this.state.users[id].name = name; this.state.users[id].dept = dept; }
                }
                this.save(); alert("인사 동기화 완료");
            };
            reader.readAsArrayBuffer(file);
        },

        handleInternExcel: function(input) {
            const file = input.files[0]; const reader = new FileReader();
            reader.onload = (e) => {
                const rows = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result), {type:'array'}).Sheets[0], {header:1});
                const type = document.getElementById('intern-type').value, year = document.getElementById('intern-year').value;
                if(!this.state.interns[type]) this.state.interns[type] = {}; if(!this.state.interns[type][year]) this.state.interns[type][year] = [];
                for(let i=1; i<rows.length; i++){
                    const d = rows[i]; if(d[0]) this.state.interns[type][year].push({ name:d[0], entry:d[1], finalM:d[2], region:d[3], plat:d[4], status:d[19]||'지원자' });
                }
                this.save(); alert("인턴 일괄 등록 완료");
            }; reader.readAsArrayBuffer(file);
        },

        togglePanel: function(p) { document.querySelectorAll('.panel').forEach(el=>el.classList.add('hidden')); document.getElementById(p+'-panel').classList.remove('hidden'); document.getElementById('main-content').classList.add('hidden'); },
        switchTab: function(p, t) { document.querySelectorAll(`#${p}-panel [id^="tab-"]`).forEach(x=>x.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); document.querySelectorAll(`#${p}-panel .tab-link`).forEach(l=>l.classList.remove('active')); event.target.classList.add('active'); },
        goHome: function() { document.querySelectorAll('.panel').forEach(p=>p.classList.add('hidden')); document.getElementById('main-content').classList.remove('hidden'); },
        renderAdminUserList: function() {
            const q = document.getElementById('u-search').value.toLowerCase();
            document.getElementById('admin-u-table').innerHTML = `<thead><tr><th>사번</th><th>성함</th><th>소속</th><th>관리</th></tr></thead><tbody>` + 
                Object.keys(this.state.users).filter(id=>id.includes(q) || this.state.users[id].name.toLowerCase().includes(q)).map(id=>`<tr><td>${id}</td><td>${this.state.users[id].name}</td><td>${this.state.users[id].dept}</td><td><button class="btn btn-sm btn-outline" onclick="app.loadUserEdit('${id}')">편집</button><button class="btn btn-sm btn-blue" onclick="app.resetUserPw('${id}')">비번초기화</button></td></tr>`).join('') + `</tbody>`;
            document.getElementById('arch-select').innerHTML = `<option value="">교육 선택</option>` + this.state.trainings.map(t=>`<option value="${t.id}">${t.title}</option>`).join('');
        },
        loadUserEdit: function(id) { const u = this.state.users[id]; document.getElementById('old-u-id').value = id; document.getElementById('u-id').value = id; document.getElementById('u-name').value = u.name; document.getElementById('u-dept').value = u.dept; document.getElementById('u-pos').value = u.pos; document.getElementById('u-role').value = u.role; document.getElementById('u-edit-mode').innerText="사번 수정 가능 모드"; window.scrollTo(0,0); },
        clearUserForm: function() { document.getElementById('old-u-id').value = ''; ['u-id','u-name','u-dept'].forEach(k=>document.getElementById(k).value=''); document.getElementById('u-edit-mode').innerText="유저 개별 관리"; },
        addSessionToList: function() {
            const d = document.getElementById('s-date').value, s = document.getElementById('s-start').value, e = document.getElementById('s-end').value, b = parseFloat(document.getElementById('s-break').value || 0);
            if(!d || !s || !e) return alert("필수 정보 입력");
            const total = ((new Date(`2000-01-01T${e}`) - new Date(`2000-01-01T${s}`)) / 3600000 - b).toFixed(1);
            this.tempSessions.push({ date: d, start: s, end: e, total });
            document.getElementById('added-sessions-box').innerHTML = this.tempSessions.map(x=>`<div>${x.date} / ${x.start}~${x.end} (${x.total}h)</div>`).join('');
        },
        saveTraining: function() {
            const data = { id: Date.now(), title: document.getElementById('t-title').value, cat: document.getElementById('t-cat-sel').value, place: document.getElementById('t-place').value, sessions: [...this.tempSessions], targetDepts: Array.from(document.querySelectorAll('.dept-check:checked')).map(c=>c.value), isMandatory: document.getElementById('t-mandatory').checked, active: true };
            this.state.trainings.unshift(data); this.save(); alert("등록됨"); this.tempSessions = [];
        },
        renderAdminDashboard: function() {
            document.getElementById('st-u').innerText = Object.keys(this.state.users).length;
            document.getElementById('st-t').innerText = this.state.trainings.length;
            document.getElementById('st-w').innerText = this.state.apps.filter(a=>a.status === '신청중').length;
            document.getElementById('st-d').innerText = this.state.apps.filter(a=>a.status === '이수완료').length;
            document.getElementById('admin-master-train-table').innerHTML = `<thead><tr><th>교육명</th><th>관리</th></tr></thead><tbody>` + this.state.trainings.map(t=>`<tr><td>${t.title}</td><td><button class="btn btn-sm btn-danger" onclick="app.delTrain(${t.id})">삭제</button></td></tr>`).join('') + `</tbody>`;
        },
        delTrain: function(id) { if(confirm("삭제?")) { this.state.trainings=this.state.trainings.filter(t=>t.id!==id); this.save(); }},
        delIntern: function(idx) { if(confirm("인턴 삭제?")) { const t = document.getElementById('intern-type').value, y = document.getElementById('intern-year').value; this.state.interns[t][y].splice(idx,1); this.save(); }},
        renderMyPage: function() {
            const u = this.state.users[this.state.user];
            document.getElementById('my-profile-display').innerText = `이름: ${u.name} | 소속: ${u.dept} | 직급: ${u.pos}`;
            document.getElementById('my-apps-table').innerHTML = `<thead><tr><th>교육명</th><th>상태</th></tr></thead><tbody>` + this.state.apps.filter(a=>a.uId==this.state.user).map(a=>`<tr><td>${a.tTitle}</td><td><span class="badge">${a.status}</span></td></tr>`).join('') + `</tbody>`;
        },
        apply: function(tId) { 
            if(this.state.apps.find(a=>a.tId==tId && a.uId==this.state.user)) return alert("이미 신청됨");
            this.state.apps.push({ tId, tTitle: this.state.trainings.find(i=>i.id==tId).title, uId: this.state.user, uName: this.state.users[this.state.user].name, status: '신청중', date: new Date().toLocaleDateString() });
            this.save(); alert("신청 완료"); 
        },
        toggleDeptSection: function() { document.getElementById('dept-select-section').classList.toggle('hidden', !document.getElementById('t-mandatory').checked); },
        addCategory: function() { const v = document.getElementById('new-cat-input').value; if(v) { this.state.cats.push(v); this.save(); document.getElementById('new-cat-input').value=''; }},
        delCat: function(c) { if(confirm("삭제?")) { this.state.cats = this.state.cats.filter(i=>i!==c); this.save(); }},
        changePasswordDirect: function() { const pw = document.getElementById('my-new-pw').value; if(pw.length < 4) return alert("4자 이상"); this.state.users[this.state.user].pw = pw; this.save(); alert("변경됨"); }
    };
    app.init();
</script>
</body>
</html>
