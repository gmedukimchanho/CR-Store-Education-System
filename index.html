<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CR Store Education System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --bg: #fff; --text: #000; --border: #000; --gray: #888; --light: #f9f9f9; --accent: #ff4d4d; --blue: #0066cc; --green: #217346; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }
        .hidden { display: none !important; }
        
        .btn { border: 1px solid var(--border); background: #000; color: #fff; padding: 10px 18px; cursor: pointer; font-weight: 800; font-size: 11px; letter-spacing: 1px; transition: 0.2s; text-transform: uppercase; text-align: center; border-radius: 0; }
        .btn:hover { background: #fff; color: #000; }
        .btn-sm { padding: 6px 12px; font-size: 10px; }
        .btn-outline { background: #fff; color: #000; }
        .btn-danger { border-color: var(--accent); color: var(--accent); background: #fff; }
        .btn-blue { border-color: var(--blue); color: var(--blue); background: #fff; }
        .btn-excel { border-color: var(--green); color: var(--green); background: #fff; }
        .btn-full { width: 100%; display: block; }

        input, select, textarea { background: #fff; border: 1px solid #ddd; padding: 10px; width: 100%; margin-bottom: 10px; font-size: 13px; border-radius: 0; }
        header { padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #000; position: sticky; top: 0; background: #fff; z-index: 100; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 50px; }
        .section-header { margin: 40px 0 20px 0; border-bottom: 3px solid #000; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { border: 1px solid #eee; min-height: 400px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
        .panel { margin-top: 30px; border: 1px solid #000; padding: 30px; background: #fff; }
        .tabs { display: flex; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid #eee; overflow-x: auto; }
        .tab-link { font-size: 11px; font-weight: 800; color: #ccc; cursor: pointer; white-space: nowrap; }
        .tab-link.active { color: #000; text-decoration: underline; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; font-size: 12px; }
        .badge { padding: 3px 6px; font-size: 9px; font-weight: 800; border: 1px solid #000; display: inline-block; }
        .status-이수완료 { background: #000; color: #fff; }
        .mandatory-tag { background: var(--accent); color: #fff; padding: 4px 8px; font-size: 10px; font-weight: 900; position: absolute; top: 10px; left: 10px; z-index: 10; }
        .history-box { background: #f9f9f9; border: 2px solid #000; padding: 25px; margin: 20px 0; }

        /* 📱 Mobile Optimized */
        @media (max-width: 768px) {
            header { padding: 15px 20px; flex-direction: column; text-align: center; gap: 15px; }
            .nav-info { flex-wrap: wrap; justify-content: center; gap: 10px; }
            .container { padding: 15px; }
            .section-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .grid { grid-template-columns: 1fr; }
            table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            #tab-a-user > div, #tab-a-train > div { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body>

<div id="loading-screen" style="position:fixed; inset:0; background:#fff; z-index:10000; display:flex; align-items:center; justify-content:center; font-weight:900;">
    GM EDU SYSTEM 실시간 동기화 중...
</div>

<div id="auth-overlay" class="hidden">
    <div class="auth-box" style="width:360px; margin:100px auto; text-align:center;">
        <h1 style="margin-bottom:30px;">CR Store Education</h1>
        <input type="text" id="login-id" placeholder="사번">
        <input type="password" id="login-pw" placeholder="비밀번호">
        <button class="btn btn-full" onclick="app.handleLogin()">로그인</button>
        <p style="font-size:11px; color:#999; margin-top:20px;">* 어드민이 등록한 사번으로 로그인 가능합니다.</p>
    </div>
</div>

<header>
    <h1 onclick="app.goHome()">CR Store Education System</h1>
    <div class="nav-info">
        <span id="display-user"></span>
        <button class="btn btn-outline btn-sm" onclick="app.togglePanel('mypage')">마이페이지</button>
        <button id="admin-toggle-btn" class="btn btn-outline btn-sm hidden" onclick="app.togglePanel('admin')">어드민 패널</button>
        <button class="btn btn-sm" onclick="location.reload()">로그아웃</button>
    </div>
</header>

<div class="container">
    <div id="notice-bar-top" class="notice-bar" style="background:var(--light); padding:15px 25px; margin-bottom:30px; border-left:5px solid #000; font-size:13px; cursor:pointer;" onclick="app.togglePanel('mypage')">
        <span><b>[공지]</b> <span id="notice-text">공지사항을 불러오고 있습니다...</span></span>
    </div>

    <div id="admin-panel" class="panel hidden">
        <div class="tabs">
            <span class="tab-link active" onclick="app.switchTab('admin', 'a-dash')">대시보드</span>
            <span class="tab-link" onclick="app.switchTab('admin', 'a-user')">인사/이수 관리</span>
            <span class="tab-link" onclick="app.switchTab('admin', 'a-train')">교육 등록/편집</span>
        </div>

        <div id="tab-a-dash">
            <div class="stats-row" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px;">
                <div class="stat-card" style="border:1px solid #eee; padding:20px; text-align:center;"><span>총 유저</span><p id="st-u">0</p></div>
                <div class="stat-card" style="border:1px solid #eee; padding:20px; text-align:center;"><span>활성 교육</span><p id="st-t">0</p></div>
                <div class="stat-card" style="border:1px solid #eee; padding:20px; text-align:center;"><span>대기</span><p id="st-w">0</p></div>
                <div class="stat-card" style="border:1px solid #eee; padding:20px; text-align:center;"><span>완료</span><p id="st-d">0</p></div>
            </div>
            <table id="admin-master-train-table"></table>
            <div id="admin-train-detail-box" class="hidden history-box">
                <h3 id="detail-train-title">신청자 명단 상세 관리</h3>
                <table id="admin-train-app-table"></table>
            </div>
        </div>

        <div id="tab-a-user" class="hidden">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px; margin-bottom:30px;">
                <div class="admin-form" style="border:1px solid #000; padding:20px; background:#fafafa;">
                    <h4 id="u-edit-title">👤 임직원 개별 등록/편집</h4>
                    <input type="text" id="u-id" placeholder="사번">
                    <input type="text" id="u-name" placeholder="성함">
                    <input type="text" id="u-dept" placeholder="소속">
                    <select id="u-role"><option value="user">일반</option><option value="admin">어드민</option></select>
                    <button class="btn btn-sm btn-full" onclick="app.adminSaveUser()">저장</button>
                    <button class="btn btn-sm btn-outline btn-full" style="margin-top:5px;" onclick="app.clearUserForm()">초기화</button>
                </div>
                <div style="background:#f0f7ff; padding:20px; border:1px solid #cce5ff;">
                    <h4>📊 엑셀 일괄 동기화</h4>
                    <input type="file" id="excel-input" accept=".xlsx, .xls, .csv">
                    <button class="btn btn-excel btn-full" onclick="app.handleExcelUpload()">업로드 실행</button>
                </div>
            </div>
            <input type="text" id="u-search" placeholder="성함, 사번, 소속 검색..." onkeyup="app.renderAdminUserList()" style="width:100%;">
            <div id="u-history-box" class="hidden history-box">
                <h3 id="u-history-title"></h3>
                <div style="margin:15px 0; display:flex; gap:10px;">
                    <select id="arch-select" style="flex:2;"></select>
                    <button class="btn btn-sm" onclick="app.manualAddHistory()">이력 강제 추가</button>
                </div>
                <table id="u-history-table"></table>
            </div>
            <table id="admin-u-table"></table>
        </div>

        <div id="tab-a-train" class="hidden">
            <input type="text" id="t-title" placeholder="교육 명칭">
            <input type="number" id="t-quota" placeholder="정원">
            <input type="text" id="t-place" placeholder="장소">
            <button class="btn btn-full" onclick="app.saveTraining()">교육 저장</button>
        </div>
    </div>

    <div id="main-content">
        <div id="training-grid" class="grid"></div>
    </div>
</div>

<script>
    // ⚠️ Firebase 설정값 (찬호 님 정보)
    const firebaseConfig = {
        apiKey: "AIzaSyD-d8gTqhpFinzg-sACv-HKqPaFOKjhJAI",
        authDomain: "cr-store-edu-system.firebaseapp.com",
        projectId: "cr-store-edu-system",
        storageBucket: "cr-store-edu-system.firebasestorage.app",
        messagingSenderId: "663570679286",
        appId: "1:663570679286:web:96c91e668ab180ac9673d7",
        databaseURL: "https://cr-store-edu-system-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const app = {
        state: { user: null, users: {}, trainings: [], apps: [], notices: [], statusOptions: ["신청중", "신청완료", "이수완료", "미이수", "신청취소"] },

        init: function() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                this.state.users = data.users || { 'monster1246': { pw: '1234', role: 'admin', name: '마스터' } };
                this.state.trainings = data.trainings || [];
                this.state.apps = data.apps || [];
                this.state.notices = data.notices || [];

                document.getElementById('loading-screen').classList.add('hidden');
                if(!this.state.user) {
                    document.getElementById('auth-overlay').classList.remove('hidden');
                } else {
                    this.renderHome();
                }
            });
        },

        save: function() {
            db.ref('/').update({
                users: this.state.users,
                trainings: this.state.trainings,
                apps: this.state.apps,
                notices: this.state.notices
            });
        },

        handleLogin: function() {
            const id = document.getElementById('login-id').value.trim();
            const pw = document.getElementById('login-pw').value.trim();
            const u = this.state.users[id];
            if(!u) return alert("등록되지 않은 사번입니다.");
            if(u.pw === pw) {
                this.state.user = id;
                document.getElementById('auth-overlay').classList.add('hidden');
                this.renderHome();
            } else alert("비밀번호 오류");
        },

        renderHome: function() {
            const u = this.state.users[this.state.user];
            document.getElementById('display-user').innerText = `${u.name}(${this.state.user})님 환영합니다.`;
            if(u.role === 'admin') document.getElementById('admin-toggle-btn').classList.remove('hidden');

            document.getElementById('training-grid').innerHTML = this.state.trainings.filter(t=>t.active).map(t => `
                <div class="card">
                    <div class="card-content"><h3>${t.title}</h3><p>📍 ${t.place}</p></div>
                    <button class="btn btn-full" onclick="app.apply(${t.id})">신청하기</button>
                </div>
            `).join('');
            this.renderAdminUserList();
            this.renderAdminDashboard();
        },

        /* Personnel History & Management (V37 logic) */
        renderAdminUserList: function() {
            const q = document.getElementById('u-search').value.toLowerCase();
            const fids = Object.keys(this.state.users).filter(id => id.includes(q) || this.state.users[id].name.toLowerCase().includes(q));
            document.getElementById('admin-u-table').innerHTML = `<thead><tr><th>사번</th><th>성함</th><th>소속</th><th>관리</th></tr></thead><tbody>` + 
                fids.map(id => `<tr><td>${id}</td><td>${this.state.users[id].name}</td><td>${this.state.users[id].dept || '-'}</td><td>
                <button class="btn btn-sm btn-outline" onclick="app.loadUserEdit('${id}')">편집</button>
                <button class="btn btn-sm btn-outline" style="color:var(--blue);" onclick="app.showHistory('${id}')">이수관리</button>
                <button class="btn btn-sm btn-danger" onclick="app.deleteUser('${id}')">삭제</button></td></tr>`).join('') + `</tbody>`;
            document.getElementById('arch-select').innerHTML = `<option value="">교육 선택</option>` + this.state.trainings.map(t=>`<option value="${t.id}">${t.title}</option>`).join('');
        },

        showHistory: function(id) {
            this.state.targetUser = id;
            document.getElementById('u-history-box').classList.remove('hidden');
            document.getElementById('u-history-title').innerText = `${this.state.users[id].name} 상세 이력`;
            const h = this.state.apps.filter(a => a.uId == id);
            document.getElementById('u-history-table').innerHTML = h.map(x => `<tr><td>${x.tTitle}</td><td><select onchange="app.statusChange(${x.tId},'${x.uId}',this.value)">${this.state.statusOptions.map(opt=>`<option value="${opt}" ${x.status===opt?'selected':''}>${opt}</option>`).join('')}</select></td><td><button class="btn btn-sm btn-danger" onclick="app.delH(${x.tId},'${x.uId}')">X</button></td></tr>`).join('');
        },

        statusChange: function(tId,uId,ns) {
            const idx = this.state.apps.findIndex(a=>a.tId==tId && a.uId==uId);
            if(idx>-1) { this.state.apps[idx].status = ns; this.save(); }
        },

        delH: function(tId,uId) {
            if(confirm("이력 삭제?")) { this.state.apps = this.state.apps.filter(a=>!(a.tId==tId && a.uId==uId)); this.save(); this.showHistory(uId); }
        },

        apply: function(tId) {
            const t = this.state.trainings.find(i=>i.id==tId);
            this.state.apps.push({ tId, tTitle: t.title, uId: this.state.user, uName: this.state.users[this.state.user].name, status: '신청중' });
            this.save(); alert("완료");
        },

        adminSaveUser: function() {
            const id = document.getElementById('u-id').value.trim();
            if(!id) return alert("사번 필수");
            this.state.users[id] = { pw: '1234', role: document.getElementById('u-role').value, name: document.getElementById('u-name').value, dept: document.getElementById('u-dept').value };
            this.save(); alert("저장됨");
        },

        handleExcelUpload: function() {
            const fi = document.getElementById('excel-input'), file = fi.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                for(let i = 1; i < rows.length; i++) {
                    const id = String(rows[i][0]), name = rows[i][1], dept = rows[i][2];
                    if(id) this.state.users[id] = { pw: '1234', role: 'user', name, dept };
                }
                this.save(); alert("동기화 완료");
            };
            reader.readAsArrayBuffer(file);
        },

        saveTraining: function() {
            this.state.trainings.unshift({ id: Date.now(), title: document.getElementById('t-title').value, quota: document.getElementById('t-quota').value, place: document.getElementById('t-place').value, active: true });
            this.save(); alert("등록됨");
        },

        renderAdminDashboard: function() {
            document.getElementById('st-u').innerText = Object.keys(this.state.users).length;
            document.getElementById('st-t').innerText = this.state.trainings.length;
            document.getElementById('admin-master-train-table').innerHTML = this.state.trainings.map(t=>`<tr><td>${t.title}</td><td><button class="btn btn-sm btn-danger" onclick="app.deleteTraining(${t.id})">삭제</button></td></tr>`).join('');
        },

        deleteTraining: function(id) { if(confirm("교육 삭제?")) { this.state.trainings=this.state.trainings.filter(t=>t.id!==id); this.save(); }},
        deleteUser: function(id) { if(confirm("유저 삭제?")) { delete this.state.users[id]; this.save(); }},
        togglePanel: function(p) { document.querySelectorAll('.panel').forEach(el=>el.classList.add('hidden')); document.getElementById(p+'-panel').classList.remove('hidden'); document.getElementById('main-content').classList.add('hidden'); },
        goHome: function() { document.querySelectorAll('.panel').forEach(p=>p.classList.add('hidden')); document.getElementById('main-content').classList.remove('hidden'); },
        switchTab: function(p, t) { document.querySelectorAll(`#${p}-panel [id^="tab-"]`).forEach(x=>x.classList.add('hidden')); document.getElementById('tab-'+t).classList.remove('hidden'); }
    };

    app.init();
</script>
</body>
</html>
